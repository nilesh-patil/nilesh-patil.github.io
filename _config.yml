# =============================================================================
# Site identity
# =============================================================================
title: "Nilesh Patil"
subtitle: "AI systems & applied research"
title_separator: "-"
name: "Nilesh Patil"
description: >-
  AI leader building deployable AI systems, agentic workflows, and
  organizational adoption in regulated and large-scale environments.
url: "https://nilesh-patil.github.io"
baseurl: ""
repository: "nilesh-patil/nilesh-patil.github.io"
logo: "/images/nilesh-patil.jpg"
masthead_title: " "
locale: "en-US"
timezone: "Asia/Kolkata"
words_per_minute: 200

# =============================================================================
# Open Graph / Twitter Card / structured data
# Wires og:image, og:description, Twitter Card meta tags, and Person JSON-LD.
# Person JSON-LD `sameAs` links power Google knowledge-graph disambiguation
# for the common name "Nilesh Patil".
# =============================================================================
og_image: "nilesh-patil.jpg"
og_description: "Head of AI at DreamStreet. Building compliance-aware AI systems for SEBI-regulated investor and trader workflows. Previously Head of Applied Research, Dream11."

twitter:
  username: optimistic_flw

social:
  type: Person
  name: "Nilesh Patil"
  links:
    - "https://github.com/nilesh-patil"
    - "https://x.com/optimistic_flw"
    - "https://scholar.google.co.in/citations?user=IIabY1sAAAAJ"
    - "https://nilesh-patil.medium.com/"
    - "https://orcid.org/0000-0002-3438-8571"

# =============================================================================
# Author profile (sidebar via author_profile: true)
# NOTE: email omitted intentionally — contact is via LinkedIn / GitHub only.
# =============================================================================
author:
  name: "Nilesh Patil"
  avatar: "nilesh-patil.jpg"   # template prepends /images/
  bio: "Head of AI at DreamStreet. Previously Head of Applied Research, Dream11."
  location: "Mumbai, India"
  employer: "DreamStreet"
  googlescholar: "https://scholar.google.co.in/citations?user=IIabY1sAAAAJ"
  github: "nilesh-patil"
  twitter: "optimistic_flw"
  medium: "https://nilesh-patil.medium.com/"
  linkedin: "ensembledme"   # template prepends https://www.linkedin.com/in/
  orcid: "https://orcid.org/0000-0002-3438-8571"
  # `stackoverflow:` intentionally omitted (see _data/authors.yml).

# =============================================================================
# Build
# =============================================================================
markdown: kramdown
remote_theme: false
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - vendor
  - docs

# Conversion / Markdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..3
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

# =============================================================================
# Plugins
# =============================================================================
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-redirect-from

# =============================================================================
# Archives
# =============================================================================
category_archive:
  type: liquid
  path: /category-archive/
tag_archive:
  type: liquid
  path: /tag-archive/

# =============================================================================
# Collections
# =============================================================================
collections:
  posts:
    output: true
    permalink: /posts/:title/             # → /posts/<slug>/  (drops date prefix)
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/

# =============================================================================
# Defaults
# =============================================================================
defaults:
  - scope: { path: "", type: posts }
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false   # giscus repo_id/category_id unset; re-enable after running https://giscus.app
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope: { path: "", type: publications }
    values:
      layout: single
      author_profile: true
      share: false
  - scope: { path: "", type: portfolio }
    values:
      layout: single
      author_profile: true
      share: true
  - scope: { path: "", type: talks }
    values:
      layout: talk
      author_profile: true
  - scope: { path: "", type: teaching }
    values:
      layout: single
      author_profile: true
  - scope: { path: "_pages" }
    values:
      layout: single
      author_profile: true

# =============================================================================
# Pagination
# =============================================================================
paginate: 5
paginate_path: /page:num/

# =============================================================================
# Comments — giscus
# Run https://giscus.app once after enabling Discussions on the repo
# to fill repo_id and category_id below. Theme follows site dark-mode toggle.
# =============================================================================
comments:
  provider: giscus
  giscus:
    repo: "nilesh-patil/nilesh-patil.github.io"
    hide_button: false
    default_message: true
    repo_id: ""                  # paste from giscus.app
    category_name: "General"
    category_id: ""              # paste from giscus.app
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "preferred_color_scheme"

# =============================================================================
# Search — Pagefind (build-time, not a Jekyll plugin)
# Run `npx pagefind --site _site` after Jekyll builds. See _includes/search/.
# =============================================================================
search: false

# =============================================================================
# Math — KaTeX (loaded only on pages with math: true)
# Replaces academicpages MathJax default.
# =============================================================================
math_engine: katex

# =============================================================================
# Theme — academicpages built-in dark mode
# Light/dark variants are paired in _sass/theme/_default_{light,dark}.scss.
# A pre-paint script in _includes/head.html sets data-theme before render
# to prevent FOUC; the masthead toggle persists preference in localStorage.
# =============================================================================
site_theme: "default"
dark_mode: true

# =============================================================================
# Custom feature flags
# Flip in this file to surface Talks / Teaching in the nav.
# =============================================================================
show_talks: false
show_teaching: false

# =============================================================================
# Footer
# =============================================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/nilesh-patil"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://nilesh-patil.medium.com/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ensembledme"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.co.in/citations?user=IIabY1sAAAAJ"

# =============================================================================
# Analytics: OMITTED — zero outbound telemetry
# (No google.analytics, no GA4, no Plausible, no GoatCounter, no CF analytics.)
# =============================================================================
