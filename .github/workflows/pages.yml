# Build the Jekyll site, run Pagefind over the output, and deploy to GitHub Pages.
# Replaces the default `pages-build-deployment` job so we can append Pagefind.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          # No `cache: "npm"` -- repo has no package-lock.json (npx --yes pagefind
          # fetches what it needs at runtime). Cache the pagefind binary with
          # actions/cache directly if CI time becomes an issue.

      - uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # v1.99.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build site (Jekyll)
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Build search index (Pagefind)
        run: npx --yes pagefind --site _site

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
