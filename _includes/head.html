{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

{% if site.dark_mode %}
<script>
  // Pre-paint theme application: runs synchronously before <body> renders to
  // prevent a flash of unstyled content. Three modes: light (default), dark,
  // sepia. Cycle + persistence logic lives in assets/js/theme-cycle.js
  // (loaded after the academicpages bundle to override the stock 2-state
  // toggle).
  (function () {
    try {
      var stored = localStorage.getItem('theme');
      var allowed = stored === 'dark' || stored === 'light' || stored === 'sepia';
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = allowed ? stored : (prefersDark ? 'dark' : 'light');
      if (theme === 'dark' || theme === 'sepia') {
        document.documentElement.setAttribute('data-theme', theme);
      }
    } catch (_) { /* localStorage may be blocked; fall through to light. */ }
  })();
</script>
{% endif %}

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
